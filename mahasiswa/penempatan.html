<!doctype html>

  <body class="bg-slate-50 font-sans">
    <div class="flex min-h-screen">
      <aside class="w-64 bg-emerald-800 text-white p-6 hidden md:block">

          <h1 class="text-xl font-bold tracking-tighter">SI-PPL FTK</h1>
          <p class="text-xs text-emerald-200">Portal Mahasiswa</p>
        </div>
        <nav class="space-y-4 text-sm">
          <a
            href="index.html"
            class="block p-3 hover:bg-emerald-700 rounded-lg transition"
            ><i class="fas fa-home mr-3"></i> Dashboard</a
          >
          <a href="penempatan.html" class="block p-3 bg-emerald-700 rounded-lg"
            ><i class="fas fa-school mr-3"></i> Penempatan</a

          <a

            class="block p-3 hover:bg-emerald-700 rounded-lg transition"

            class="block p-3 hover:bg-emerald-700 rounded-lg transition"

      <main class="flex-1">
        <header

          <div>
            <h2 class="text-lg font-semibold text-gray-700">Penempatan</h2>
            <p class="text-sm text-slate-500">

          <button

          </button>
        </header>
        <div class="p-8 space-y-6">
          <div class="grid gap-4 md:grid-cols-2">
            <div
              class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm"

              <p class="text-xs uppercase text-slate-400">Sekolah Mitra</p>
              <p class="mt-3 text-lg font-semibold text-slate-900">

              </p>
              <p class="text-sm text-slate-500 mt-2">
                Alamat: Jl. Merdeka No. 17
              </p>
            </div>
            <div
              class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm"
            >
              <p class="text-xs uppercase text-slate-400">Guru Pamong</p>
              <p class="mt-3 text-lg font-semibold text-slate-900">
                Ibu Saraswati
              </p>

                Mata Pelajaran: Bahasa Indonesia
