<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekap & Laporan - Admin PPL</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">PPL FTK Admin</div>
      <nav class="sidebar-nav">
        <a href="../dashboard/index.html" class="nav-item">Dashboard</a>
        <a href="../periode/index.html" class="nav-item">Manajemen Periode</a>
        <a href="../mitra/index.html" class="nav-item">Sekolah & DPL</a>
        <a href="../laporan/index.html" class="nav-item active">Rekap & Laporan</a>
      </nav>
      <div style="padding: 1rem; border-top: 1px solid var(--sidebar-hover);">
        <a href="../../index.html" class="nav-item" style="padding: 0.5rem 1rem;">Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <h1 style="font-size: 1.25rem; font-weight: 600;">Rekap Nilai & Laporan Akhir</h1>
      </header>

      <div class="page-container">
        <!-- Export Controls -->
        <div class="card mb-4">
          <div class="flex justify-between items-center">
            <div class="flex gap-2">
              <select class="form-input" style="width: 200px;">
                <option>Semua Prodi</option>
                <option>PAI</option>
                <option>PBA</option>
                <option>PGMI</option>
              </select>
              <select class="form-input" style="width: 200px;">
                <option>Angkatan 2026 Ganjil</option>
              </select>
            </div>
            <div class="flex gap-2">
              <button class="btn btn-outline">Export Excel</button>
              <button class="btn btn-outline">Generate Sertifikat (ZIP)</button>
            </div>
          </div>
        </div>

        <!-- Reports Table -->
        <div class="card" style="padding: 0;">
          <table class="table">
            <thead>
              <tr>
                <th>Mahasiswa</th>
                <th>Prodi</th>
                <th>Sekolah</th>
                <th>DPL</th>
                <th>Nilai</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="report-table"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script>
    const reportTable = document.getElementById('report-table');
    const students = store.get('students');

    reportTable.innerHTML = students.map(s => `
      <tr>
        <td>
          <p style="font-weight: 500; margin-bottom: 0.25rem;">${s.name}</p>
          <p class="text-xs text-muted">${s.id}</p>
        </td>
        <td>${s.prodi}</td>
        <td>${s.school || '-'}</td>
        <td>${s.dpl || '<span class="text-muted">Belum ada</span>'}</td>
        <td style="font-weight: 700;">88.5</td>
        <td><span class="badge badge-success">Lulus (A)</span></td>
      </tr>
    `).join('');
  </script>
</body>
</html>
