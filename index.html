      :root {
        --font-sans:

        --color-text-primary: #1a1a1a;
        --color-text-secondary: #666666;
        --color-text-tertiary: #999999;
        --color-text-danger: #c41c1c;
        --color-text-warning: #8b5f0f;
        --color-text-success: #0f6e56;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f6f6f6;
        --color-background-danger: #fdd8d8;
        --color-background-warning: #fef3e8;
        --color-background-success: #e1f5ee;
        --color-border-primary: #3b82f6;
        --color-border-secondary: #d1d5db;
        --color-border-tertiary: #e5e7eb;
        --color-border-danger: #fca5a5;
        --color-border-warning: #efc16c;
        --color-border-success: #5dcaa5;
        --border-radius-lg: 8px;
        --border-radius-md: 6px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        padding: 0 1rem;
      }
      .wrap {
        padding: 1.5rem 0;
        max-width: 1200px;
        margin: 0 auto;
      }
      .header {
        margin-bottom: 1.5rem;
      }
      .header h2 {
        font-size: 18px;
        font-weight: 500;
        color: var(--color-text-primary);
        margin-bottom: 4px;
      }
      .header p {
        font-size: 13px;
        color: var(--color-text-secondary);
      }
      .modules {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      .mod {
        background: var(--color-background-secondary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        padding: 14px 16px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .mod:hover {
        border-color: var(--color-border-secondary);
        background: var(--color-background-primary);
      }
      .mod.active {
        border-color: var(--color-border-primary);
        background: var(--color-background-primary);
      }
      .mod-icon {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mod-num {
        font-size: 11px;
        font-weight: 500;
        margin-bottom: 4px;
        color: var(--color-text-tertiary);
      }
      .mod-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-primary);
        line-height: 1.3;
      }
      .mod-count {
        font-size: 11px;
        color: var(--color-text-tertiary);
        margin-top: 3px;
      }
      .detail {
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        overflow: hidden;
      }
      .detail-head {
        padding: 16px 20px;
        border-bottom: 0.5px solid var(--color-border-tertiary);
      }
      .detail-head h3 {
        font-size: 16px;
        font-weight: 500;
        color: var(--color-text-primary);
      }
      .detail-head p {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-top: 4px;
        line-height: 1.5;
      }
      .actors {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }
      .actor {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 20px;
        font-weight: 500;
        border: 0.5px solid;
      }
      .features {
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .feat {
        padding: 14px 16px;
        background: var(--color-background-secondary);
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: start;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .feat:hover {
        border-color: var(--color-border-secondary);
        background: var(--color-background-primary);
      }
      .feat:last-child {
        border-bottom: none;
      }
      .feat-name {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-primary);
        margin-bottom: 4px;
      }
      .feat-desc {
        font-size: 12px;
        color: var(--color-text-secondary);
        line-height: 1.5;
      }
      .feat-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }
      .tag {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 10px;
        border: 0.5px solid var(--color-border-tertiary);
        color: var(--color-text-secondary);
      }
      .prio {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 10px;
        font-weight: 500;
        white-space: nowrap;
        align-self: start;
      }
      .p-high {
        background: var(--color-background-danger);
        color: var(--color-text-danger);
        border: 0.5px solid var(--color-border-danger);
      }
      .p-med {
        background: var(--color-background-warning);
        color: var(--color-text-warning);
        border: 0.5px solid var(--color-border-warning);
      }
      .p-low {
        background: var(--color-background-success);
        color: var(--color-text-success);
        border: 0.5px solid var(--color-border-success);
      }
      .integ-section {
        padding: 16px 20px;
        border-top: 0.5px solid var(--color-border-tertiary);
      }
      .integ-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--color-text-secondary);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .integ-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .integ-item {
        background: var(--color-background-secondary);
        border-radius: var(--border-radius-md);
        padding: 10px 12px;
      }
      .integ-item-title {
        font-size: 12px;
        font-weight: 500;
        color: var(--color-text-primary);
      }
      .integ-item-desc {
        font-size: 11px;
        color: var(--color-text-secondary);
        margin-top: 2px;
        line-height: 1.4;
      }
    </style>
  </head>

      let active = 0;
      function ab(id) {
        const a = A[id];
        return `<span class="actor" style="background:${a.bg};color:${a.tc};border-color:${a.bc}">${a.label}</span>`;
      }
      function pl(p) {
        if (p === "high") return '<span class="prio p-high">Tinggi</span>';
        if (p === "med") return '<span class="prio p-med">Sedang</span>';
        return '<span class="prio p-low">Nice to have</span>';
      }
      function renderMods() {
        document.getElementById("mods").innerHTML = M.map(
          (m, i) => `
    <div class="mod${i === active ? " active" : ""}" onclick="setActive(${i})">
      <div class="mod-dot" style="background:${m.dot}"></div>
      <div class="mod-num">M${String(i + 1).padStart(2, "0")}</div>
      <div class="mod-title">${m.title}</div>
      <div class="mod-count">${m.features.length} fitur</div>
    </div>`,
        ).join("");
      }
      function renderDetail() {
        const m = M[active];
        const allA = [...new Set(m.features.flatMap((f) => f.actors))];
        document.getElementById("detail").innerHTML = `
    <div class="detail-head">
      <h3>${m.title}</h3>
      <p>Modul ${active + 1} dari ${M.length} — ${m.features.length} fitur</p>
      <div class="actors">${allA.map(ab).join("")}</div>
    </div>
    ${m.features
      .map(
        (f) => `
      <div class="feat">
        <div>
          <div class="feat-name">${f.name}${f.isNew ? '<span class="new-badge">baru</span>' : ""}</div>
          <div class="feat-desc">${f.desc}</div>
          ${f.note ? `<div class="feat-note">${f.note}</div>` : ""}
          <div class="feat-tags">${f.actors.map(ab).join("")}${f.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
        </div>
        ${pl(f.prio)}
      </div>`,
      )
      .join("")}`;
      }
      function setActive(i) {
        active = i;
        renderMods();
        renderDetail();
      }
      renderMods();
      renderDetail();
    </script>
