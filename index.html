<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPL Management System - FTK UIN SGD</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
      .login-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .login-card {
        background: white;
        padding: 3rem;
        border-radius: 1rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .role-btn {
        display: block;
        width: 100%;
        padding: 1rem;
        margin-bottom: 1rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        text-decoration: none;
        color: var(--text-main);
        font-weight: 600;
        transition: all 0.2s;
      }
      .role-btn:hover {
        background-color: var(--bg-main);
        border-color: var(--primary);
        color: var(--primary);
        transform: translateY(-2px);
      }
      .logo {
        font-size: 2rem;
        font-weight: 800;
        color: var(--primary);
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">PPL FTK</div>
        <p class="text-muted mb-4">Sistem Manajemen PPL Terintegrasi</p>

        <div style="margin-top: 2rem">
          <p class="form-label mb-4">Pilih Role untuk Masuk (Simulasi):</p>
          <a href="admin/dashboard/index.html" class="role-btn"
            >Login sebagai Admin</a
          >
          <a href="mahasiswa/dashboard/index.html" class="role-btn"
            >Login sebagai Mahasiswa</a
          >
          <a href="dpl/dashboard/index.html" class="role-btn"
            >Login sebagai DPL</a
          >
        </div>

        <div
          style="
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
          "
        >
          <a
            href="brief.html"
            class="text-sm"
            style="
              color: var(--primary);
              text-decoration: none;
              font-weight: 600;
            "
            >Lihat Daftar Fitur (Brief)</a
          >
          <a
            href="portal/index.html"
            class="text-sm"
            style="color: var(--text-muted); text-decoration: none"
            >Akses Portal Tamu & Pelaporan</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
